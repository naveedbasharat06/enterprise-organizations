server {
    listen 80;
    server_name localhost;

    # ── Vue SPA ───────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # All frontend routes go to index.html (Vue Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Django API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow large video file uploads
        client_max_body_size  500M;
        client_body_timeout   300s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── Django Admin ──────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Media files (videos, PDFs) — served directly by Nginx ─────────────────
    # Mounted from the shared Docker volume media_data → /app/media
    location /media/ {
        alias /app/media/;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Django static files (admin CSS/JS) ────────────────────────────────────
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
